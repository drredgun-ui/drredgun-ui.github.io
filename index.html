<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Test 🔐</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e1e2f,#3a0ca3);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
}

.hidden{display:none;}

.option{
margin:10px 0;
padding:12px;
background:#7209b7;
border-radius:12px;
cursor:pointer;
}

.option:hover{
background:#b5179e;
}

input,button{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:#ff4d6d;
color:white;
}
</style>
</head>

<body>

<div class="box" id="step1">
<h2>Enter Passcode 🔐</h2>
<input type="password" id="pass1">
<button onclick="checkPass1()">Enter</button>
<p id="msg1"></p>
</div>

<div class="box hidden" id="step2">
<h2>Second Passcode 🔑</h2>
<input type="password" id="pass2">
<button onclick="checkPass2()">Enter</button>
<p id="msg2"></p>
</div>

<div class="box hidden" id="quizBox">
<h2 id="question"></h2>
<div id="options"></div>
</div>

<script>

// ==========================
// 🔥 GOOGLE SCRIPT URL (PUT YOURS)
// ==========================
let scriptURL = "https://script.google.com/macros/s/AKfycby7ZbhTUrd733F5-Ah5yAcd54w5aEe8egR68DIpcvSeN8PwRaRISo_YfRgjA9p4Nk5n/exec";

// ==========================
// 🔥 STUDENT ID
// ==========================
let studentID = localStorage.getItem("studentID");
if (!studentID) {
  studentID = "STU-" + Date.now();
  localStorage.setItem("studentID", studentID);
}

// ==========================
// 🔥 DEVICE ID
// ==========================
function getDeviceID(){
  let data = navigator.userAgent + screen.width + screen.height;
  let hash = 0;
  for (let i=0;i<data.length;i++){
    hash = ((hash<<5)-hash)+data.charCodeAt(i);
    hash |= 0;
  }
  return "DEV-"+Math.abs(hash);
}
let deviceID = getDeviceID();

// ==========================
// 🌍 LOCATION
// ==========================
let userInfo = {ip:"",city:"",country:""};

async function getLocation(){
  try{
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    userInfo.ip = data.ip || "NA";
    userInfo.city = data.city || "NA";
    userInfo.country = data.country_name || "NA";
  }catch{
    userInfo.ip="NA";
    userInfo.city="NA";
    userInfo.country="NA";
  }
}

// ==========================
// 📤 SEND DATA
// ==========================
function sendData(){

  let url = scriptURL +
  "?studentID=" + studentID +
  "&deviceID=" + deviceID +
  "&ip=" + userInfo.ip +
  "&city=" + userInfo.city +
  "&country=" + userInfo.country +
  "&browser=" + navigator.userAgent +
  "&device=" + navigator.platform +
  "&start=" + startTime +
  "&end=" + endTime +
  "&q1=" + (answers[0]||"") +
  "&q2=" + (answers[1]||"") +
  "&q3=" + (answers[2]||"") +
  "&q4=" + (answers[3]||"");

  fetch(url)
  .then(()=>console.log("Sent"))
  .catch(()=>console.log("Error"));
}

// ==========================
// QUIZ
// ==========================
let answers=[];
let current=0;
let startTime="";
let endTime="";

let questions=[
{q:"1. Who are you?",o:["Bittu","Kittu","Cat","Banty"]},
{q:"2. Are you?",o:["Male","Female","Prefer not"]},
{q:"3. All good?",o:["Yes","No"]},
{q:"4. Submit?",o:["Cancel","Submit"]}
];

// ==========================
// PASSCODE
// ==========================
function checkPass1(){
if(pass1.value==="1921$"){
step1.classList.add("hidden");
step2.classList.remove("hidden");
}else msg1.innerText="Wrong ❌";
}

async function checkPass2(){

if(pass2.value==="6369$"){

msg2.innerText="Loading...";

await getLocation(); // VERY IMPORTANT

step2.classList.add("hidden");
quizBox.classList.remove("hidden");

startTime=new Date().toLocaleString();

loadQuestion();

}else msg2.innerText="Wrong ❌";
}

// ==========================
// LOAD QUESTION
// ==========================
function loadQuestion(){

let q=questions[current];

question.innerText=q.q;

let html="";
q.o.forEach(opt=>{
html+=`<div class="option" onclick="nextQuestion('${opt}')">${opt}</div>`;
});

options.innerHTML=html;
}

// ==========================
// NEXT QUESTION
// ==========================
function nextQuestion(choice){

answers.push(choice);

if(current===questions.length-1){

if(choice==="Submit"){
endTime=new Date().toLocaleString();
sendData();
quizBox.innerHTML="<h2>Submitted ✅</h2>";
}
return;
}

current++;
loadQuestion();
}

</script>

</body>
</html>
