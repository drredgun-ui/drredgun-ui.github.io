<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Test 🔐</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
backdrop-filter:blur(15px);
position:relative;
}

.hidden{display:none;}

.fade-out{
opacity:0;
transform:translateY(20px);
}

.option{
margin:10px 0;
padding:12px;
background:linear-gradient(45deg,#7209b7,#560bad);
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.option:hover{
transform:scale(1.05);
background:linear-gradient(45deg,#b5179e,#7209b7);
}

.tracker{
position:absolute;
top:10px;
right:15px;
font-size:13px;
}

.door{
position:fixed;
top:15px;
right:15px;
font-size:24px;
cursor:pointer;
}

input,button{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:#ff4d6d;
color:white;
}
</style>
</head>

<body>

<div class="door" onclick="openGhost()">🚪</div>

<div class="box" id="step1">
<h2>Enter Passcode 🔐</h2>
<input type="password" id="pass1">
<button onclick="checkPass1()">Enter</button>
<p id="msg1"></p>
</div>

<div class="box hidden" id="step2">
<h2>Second Passcode 🔑</h2>
<input type="password" id="pass2">
<button onclick="checkPass2()">Enter</button>
<p id="msg2"></p>
</div>

<div class="box hidden" id="quizBox">
<div class="tracker" id="tracker"></div>
<h2 id="question"></h2>
<div id="options"></div>
</div>

<div class="box hidden" id="ghostLogin">
<h2>👻 Ghost Room</h2>
<input type="password" id="ghostPass">
<button onclick="checkGhost()">Enter</button>
<p id="ghostMsg"></p>
</div>

<div class="box hidden" id="ghostRoom">
<h2>👻 Reports</h2>
<div id="report"></div>
</div>

<script>

// ELEMENTS
const step1=document.getElementById("step1");
const step2=document.getElementById("step2");
const quizBox=document.getElementById("quizBox");
const question=document.getElementById("question");
const options=document.getElementById("options");
const tracker=document.getElementById("tracker");

// DATA
let answers=[];
let current=0;
let startTime="";
let endTime="";

// 🔥 YOUR GOOGLE SCRIPT URL
let scriptURL="https://script.google.com/macros/s/AKfycby7ZbhTUrd733F5-Ah5yAcd54w5aEe8egR68DIpcvSeN8PwRaRISo_YfRgjA9p4Nk5n/exec";

// 🌐 USER INFO (ADVANCED)
let ua = navigator.userAgent;

let browserName = "Unknown";

// 🔥 BROWSER DETECTION
if (navigator.brave) {
  browserName = "Brave";
}
else if (ua.includes("Edg")) {
  browserName = "Microsoft Edge";
}
else if (ua.includes("OPR") || ua.includes("Opera")) {
  browserName = "Opera";
}
else if (ua.includes("SamsungBrowser")) {
  browserName = "Samsung Internet";
}
else if (ua.includes("Chrome")) {
  browserName = "Chrome";
}
else if (ua.includes("Safari")) {
  browserName = "Safari";
}
else if (ua.includes("Firefox")) {
  browserName = "Firefox";
}

// 📱 DEVICE DETECTION
let deviceName = "Unknown Device";

if (ua.includes("Windows")) deviceName = "Windows PC";
else if (ua.includes("Mac")) deviceName = "Mac";
else if (ua.includes("Android")) deviceName = "Android Phone";
else if (ua.includes("iPhone")) deviceName = "iPhone";
else if (ua.includes("iPad")) deviceName = "iPad";

let userInfo={
ip:"",
city:"",
country:"",
browser:browserName,
device:deviceName
};

let ipLoaded=false;

// GET IP + LOCATION
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
userInfo.ip=data.ip;
userInfo.city=data.city;
userInfo.country=data.country_name;
ipLoaded=true;
});

// 📤 SEND TO SHEET (FINAL FIX)
function sendToSheet(){

let url=scriptURL+
"?start="+encodeURIComponent(startTime)+
"&end="+encodeURIComponent(endTime)+

"&q1="+encodeURIComponent(answers[0]||"")+
"&q2="+encodeURIComponent(answers[1]||"")+
"&q3="+encodeURIComponent(answers[2]||"")+
"&q4="+encodeURIComponent(answers[3]||"")+

"&ip="+encodeURIComponent(userInfo.ip||"")+
"&city="+encodeURIComponent(userInfo.city||"")+
"&country="+encodeURIComponent(userInfo.country||"")+
"&browser="+encodeURIComponent(userInfo.browser||"")+
"&device="+encodeURIComponent(userInfo.device||"");

let img=new Image();
img.src=url;
}

// PASSCODE 1
function checkPass1(){
if(pass1.value==="1921$"){
step1.classList.add("hidden");
step2.classList.remove("hidden");
document.querySelector(".door").style.display="none";
}else{
msg1.innerText="Wrong ❌";
}
}

// PASSCODE 2
function checkPass2(){

if(pass2.value==="6369$"){

if(!ipLoaded){
msg2.innerText="⏳ Loading... wait 2 sec";
return;
}

step2.classList.add("hidden");
quizBox.classList.remove("hidden");

startTime=new Date().toLocaleString();

loadQuestion();

}else{
msg2.innerText="Wrong ❌";
}
}

// QUESTIONS
let questions=[
{q:"1. Who are you?",options:["Bittu","Kittu","Cat","Banty"]},
{q:"2. Are you?",options:["Male","Female","Prefer not to say"]},
{q:"3. Is everything alright?",options:["Yes","No"]},
{q:"4. Submit to me?",options:["Cancel","Submit"]}
];

// LOAD QUESTION
function loadQuestion(){
quizBox.classList.add("fade-out");

setTimeout(()=>{
let q=questions[current];

question.innerText=q.q;
tracker.innerText=(current+1)+"/"+questions.length;

let html="";
q.options.forEach(opt=>{
html+=`<div class="option" onclick="nextQuestion('${opt}')">${opt}</div>`;
});

options.innerHTML=html;
quizBox.classList.remove("fade-out");
},300);
}

// NEXT QUESTION
function nextQuestion(choice){

answers.push(choice);

if(current===questions.length-1){

if(choice==="Submit"){

endTime=new Date().toLocaleString();

sendToSheet();

quizBox.innerHTML="<h2>👻 You notified Ghost</h2>";
}
return;
}

current++;
loadQuestion();
}

// TRACK CLOSE
window.addEventListener("beforeunload",function(){

endTime=new Date().toLocaleString();

let url=scriptURL+
"?start="+encodeURIComponent(startTime)+
"&end="+encodeURIComponent(endTime);

let img=new Image();
img.src=url;
});

// GHOST ROOM
function openGhost(){
step1.classList.add("hidden");
step2.classList.add("hidden");
quizBox.classList.add("hidden");
ghostLogin.classList.remove("hidden");
}

function checkGhost(){
if(ghostPass.value==="GhostRoom1921$"){
ghostLogin.classList.add("hidden");
ghostRoom.classList.remove("hidden");

let data="";
answers.forEach((a,i)=>{
data+=`<p><b>Q${i+1}</b>: ${a}</p>`;
});

report.innerHTML=data||"No data yet";
}else{
ghostMsg.innerText="Wrong ❌";
}
}

</script>

</body>
</html>
